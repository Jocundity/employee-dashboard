services:
  frontend:
    image: employeedashboard-frontend
    build:
      context: ./frontend
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
      VITE_GNEWS_API_KEY: ${VITE_GNEWS_API_KEY}
      VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY}
    ports:
      - 5173:5173
    depends_on:
      - backend

  backend:
    image: employeedashboard-backend
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: employee_dashboard
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    ports:
      - 3000:3000
    depends_on:
      - db

  db:
    image: postgres:15.3-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: employee_dashboard
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
